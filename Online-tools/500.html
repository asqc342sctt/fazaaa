        .error-btn:hover {

        }
        
        .error-tips {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;

        }
        
        .error-tips h3 {
            color: #333;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .error-tips ul {
            list-style: none;
            padding: 0;
        }
        
        .error-tips li {
            padding: 0.5rem 0;
            color: #666;
            position: relative;
            padding-right: 1.5rem;
        }
        
        .error-tips li:before {
            content: '✓';
            color: #27ae60;
            font-weight: bold;
            position: absolute;
            right: 0;
        }
        
        @media (max-width: 768px) {

    <script>
        // إضافة تأثيرات تفاعلية
        document.addEventListener('DOMContentLoaded', function() {
            const errorContent = document.querySelector('.error-content');
            errorContent.style.opacity = '0';
            errorContent.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                errorContent.style.transition = 'all 0.6s ease';
                errorContent.style.opacity = '1';
                errorContent.style.transform = 'translateY(0)';
            }, 100);
            
            // إضافة تأثيرات للأزرار
            const buttons = document.querySelectorAll('.error-btn');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-3px) scale(1.05)';
                });
                
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0) scale(1)';
                });
            });
            
            // إضافة تأثيرات للقائمة
            const listItems = document.querySelectorAll('.error-tips li');
            listItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateX(20px)';
                
                setTimeout(() => {
                    item.style.transition = 'all 0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateX(0)';
                }, 200 + (index * 100));
            });
        });
    </script>
