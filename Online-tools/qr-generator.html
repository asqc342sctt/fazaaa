    <main class="tool-page tool-qr-generator">
        <section class="tool-hero">
            <div class="container">
                <h1>QR Code Generator</h1>
                <p>Create professional QR codes for any text or URL and download instantly.</p>
            </div>
        </section>

        <section class="tool-content container">
            <h2><i class="fas fa-qrcode"></i> QR Code Generator</h2>
            <div class="tool-interface">
                <div class="settings-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;align-items:end;">
                    <div class="setting-group" style="grid-column:1/-1;">
                        <label>Text or URL:</label>
                        <input type="text" id="qrText" placeholder="Enter text or paste a URL...">
                    </div>
                    <div class="setting-group">
                        <label>Size (px):</label>
                        <input type="number" id="qrSize" value="300" min="120" max="1000">
                    </div>
                    <div class="setting-group">
                        <label>Margin:</label>
                        <input type="number" id="qrMargin" value="2" min="0" max="20">
                    </div>
                    <div class="setting-group">
                        <label>Foreground:</label>
                        <input type="color" id="qrColor" value="#000000">
                    </div>
                    <div class="setting-group">
                        <label>Background:</label>
                        <input type="color" id="qrBg" value="#ffffff">
                    </div>
                </div>
                <div class="action-buttons" style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="generate-btn" onclick="generateQR()"><i class="fas fa-qrcode"></i> Generate</button>
                    <button class="copy-btn" id="copyQrLinkBtn"><i class="fas fa-link"></i> Copy Link</button>
                    <button class="download-btn" id="downloadQrBtn"><i class="fas fa-download"></i> Download PNG</button>
                    <button class="reset-btn" id="resetQrBtn"><i class="fas fa-redo"></i> Reset</button>
                </div>
                <div class="result-area" id="qrResult" style="display:none;margin-top:12px;">
                    <div class="card" style="padding:12px;text-align:center;">
                        <img id="qrImage" alt="QR code" style="max-width:100%;height:auto;">
                        <div style="margin-top:8px;word-break:break-all"><a id="qrLink" href="#" target="_blank"></a></div>
                    </div>
                </div>
            </div>
        </section>
