    <script src="../script.js"></script>
    <script>
        // Language data
        const translations = {
            ar: {
                mainTitle: "حاسبة العمر الذكية",
                birthDateLabel: "تاريخ الميلاد",
                currentDateLabel: "التاريخ الحالي (اختياري)",
                calculateText: "احسب عمري",
                resetText: "إعادة تعيين",
                years: "سنة",
                months: "شهر",
                days: "يوم",
                hours: "ساعة",
                minutes: "دقيقة",
                seconds: "ثانية",
                funFactsTitle: "حقائق ممتعة",
                errorInvalidDate: "يرجى إدخال تاريخ ميلاد صحيح",
                errorFutureDate: "لا يمكن أن يكون تاريخ الميلاد في المستقبل",
                errorTooOld: "العمر المدخل غير منطقي",
                totalAge: "العمر الإجمالي",
                nextBirthday: "عيد الميلاد القادم",
                daysUntilBirthday: "أيام حتى عيد الميلاد",
                zodiacSign: "البرج",
                generation: "الجيل",
                lifeStage: "مرحلة الحياة"
            },
            en: {
                mainTitle: "Smart Age Calculator",
                birthDateLabel: "Birth Date",
                currentDateLabel: "Current Date (Optional)",
                calculateText: "Calculate My Age",
                resetText: "Reset",
                years: "Years",
                months: "Months",
                days: "Days",
                hours: "Hours",
                minutes: "Minutes",
                seconds: "Seconds",
                funFactsTitle: "Fun Facts",
                errorInvalidDate: "Please enter a valid birth date",
                errorFutureDate: "Birth date cannot be in the future",
                errorTooOld: "The entered age is not logical",
                totalAge: "Total Age",
                nextBirthday: "Next Birthday",
                daysUntilBirthday: "Days Until Birthday",
                zodiacSign: "Zodiac Sign",
                generation: "Generation",
                lifeStage: "Life Stage"
            }
        };
        
        let currentLanguage = 'ar';
        
        function switchLanguage(lang) {
            currentLanguage = lang;
            
            // Update button states
            document.getElementById('arBtn').classList.toggle('active', lang === 'ar');
            document.getElementById('enBtn').classList.toggle('active', lang === 'en');
            
            // Update all text elements
            const elements = [
                'mainTitle', 'birthDateLabel', 'currentDateLabel', 
                'calculateText', 'resetText', 'funFactsTitle'
            ];
            
            elements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = translations[lang][id];
                }
            });
            
            // Update direction
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
        }
        
        function calculateAge() {
            const birthDate = document.getElementById('birthDate').value;
            const currentDate = document.getElementById('currentDate').value || new Date().toISOString().split('T')[0];
            
            if (!birthDate) {
                showError(translations[currentLanguage].errorInvalidDate);
                return;
            }
            
            const birth = new Date(birthDate);
            const current = new Date(currentDate);
            
            if (birth > current) {
                showError(translations[currentLanguage].errorFutureDate);
                return;
            }
            
            if (birth.getFullYear() < 1900) {
                showError(translations[currentLanguage].errorTooOld);
                return;
            }
            
            const age = calculateDetailedAge(birth, current);
            displayAge(age);
        }
        
        function calculateDetailedAge(birthDate, currentDate) {
            const diffTime = currentDate - birthDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            const years = Math.floor(diffDays / 365.25);
            const months = Math.floor((diffDays % 365.25) / 30.44);
            const days = Math.floor(diffDays % 30.44);
            const hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffTime % (1000 * 60)) / 1000);
            
            // Calculate next birthday
            const nextBirthday = new Date(currentDate);
            nextBirthday.setFullYear(currentDate.getFullYear());
            nextBirthday.setMonth(birthDate.getMonth());
            nextBirthday.setDate(birthDate.getDate());
            
            if (nextBirthday <= currentDate) {
                nextBirthday.setFullYear(currentDate.getFullYear() + 1);
            }
            
            const daysUntilBirthday = Math.ceil((nextBirthday - currentDate) / (1000 * 60 * 60 * 24));
            
            return {
                years,
                months,
                days,
                hours,
                minutes,
                seconds,
                totalDays: diffDays,
                daysUntilBirthday,
                nextBirthday: nextBirthday.toLocaleDateString(),
                zodiacSign: getZodiacSign(birthDate),
                generation: getGeneration(birthDate),
                lifeStage: getLifeStage(years)
            };
        }
        
        function getZodiacSign(birthDate) {
            const month = birthDate.getMonth() + 1;
            const day = birthDate.getDate();
            
            const signs = [
                [1, 20, 2, 18, "Aquarius", "دلو"],
                [2, 19, 3, 20, "Pisces", "حوت"],
                [3, 21, 4, 19, "Aries", "حمل"],
                [4, 20, 5, 20, "Taurus", "ثور"],
                [5, 21, 6, 20, "Gemini", "جوزاء"],
                [6, 21, 7, 22, "Cancer", "سرطان"],
                [7, 23, 8, 22, "Leo", "أسد"],
                [8, 23, 9, 22, "Virgo", "عذراء"],
                [9, 23, 10, 22, "Libra", "ميزان"],
                [10, 23, 11, 21, "Scorpio", "عقرب"],
                [11, 22, 12, 21, "Sagittarius", "قوس"],
                [12, 22, 1, 19, "Capricorn", "جدي"]
            ];
            
            for (let sign of signs) {
                if ((month === sign[0] && day >= sign[1]) || (month === sign[2] && day <= sign[3])) {
                    return currentLanguage === 'ar' ? sign[5] : sign[4];
                }
            }
            return currentLanguage === 'ar' ? "غير محدد" : "Unknown";
        }
        
        function getGeneration(birthDate) {
            const year = birthDate.getFullYear();
            
            if (year >= 2010) return currentLanguage === 'ar' ? "الجيل ألفا" : "Generation Alpha";
            if (year >= 1997) return currentLanguage === 'ar' ? "الجيل زد" : "Generation Z";
            if (year >= 1981) return currentLanguage === 'ar' ? "الجيل الألفي" : "Millennials";
            if (year >= 1965) return currentLanguage === 'ar' ? "الجيل إكس" : "Generation X";
            if (year >= 1946) return currentLanguage === 'ar' ? "الجيل الصامت" : "Silent Generation";
            return currentLanguage === 'ar' ? "الجيل الأعظم" : "Greatest Generation";
        }
        
        function getLifeStage(age) {
            if (age < 2) return currentLanguage === 'ar' ? "طفل رضيع" : "Infant";
            if (age < 13) return currentLanguage === 'ar' ? "طفل" : "Child";
            if (age < 20) return currentLanguage === 'ar' ? "مراهق" : "Teenager";
            if (age < 30) return currentLanguage === 'ar' ? "شاب" : "Young Adult";
            if (age < 50) return currentLanguage === 'ar' ? "بالغ" : "Adult";
            if (age < 65) return currentLanguage === 'ar' ? "متوسط العمر" : "Middle-aged";
            return currentLanguage === 'ar' ? "كبير السن" : "Senior";
        }
        
        function displayAge(age) {
            const resultSection = document.getElementById('resultSection');
            const ageDisplay = document.getElementById('ageDisplay');
            const ageDetails = document.getElementById('ageDetails');
            const funFactsContent = document.getElementById('funFactsContent');
            
            // Display main age
            ageDisplay.textContent = `${age.years} ${translations[currentLanguage].years}`;
            
            // Display detailed age
            ageDetails.innerHTML = `
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].years}</h4>
                    <div class="value">${age.years}</div>
                </div>
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].months}</h4>
                    <div class="value">${age.months}</div>
                </div>
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].days}</h4>
                    <div class="value">${age.days}</div>
                </div>
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].totalAge}</h4>
                    <div class="value">${age.totalDays}</div>
                    <div class="unit">${translations[currentLanguage].days}</div>
                </div>
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].daysUntilBirthday}</h4>
                    <div class="value">${age.daysUntilBirthday}</div>
                    <div class="unit">${translations[currentLanguage].days}</div>
                </div>
                <div class="age-detail-card">
                    <h4>${translations[currentLanguage].zodiacSign}</h4>
                    <div class="value">${age.zodiacSign}</div>
                </div>
            `;
            
            // Display fun facts
            const facts = generateFunFacts(age);
            funFactsContent.innerHTML = facts.map(fact => 
                `<div class="fun-fact">${fact}</div>`
            ).join('');
            
            resultSection.classList.add('show');
            hideError();
        }
        
        function generateFunFacts(age) {
            const facts = [];
            
            if (currentLanguage === 'ar') {
                facts.push(`أنت من ${age.generation}`);
                facts.push(`مرحلة حياتك: ${age.lifeStage}`);
                facts.push(`برجك الفلكي: ${age.zodiacSign}`);
                facts.push(`عشت ${age.totalDays.toLocaleString()} يوم حتى الآن`);
                facts.push(`نبضات قلبك تقريباً: ${(age.totalDays * 24 * 60 * 70).toLocaleString()}`);
                facts.push(`تنفست تقريباً: ${(age.totalDays * 24 * 60 * 16).toLocaleString()} مرة`);
            } else {
                facts.push(`You are from ${age.generation}`);
                facts.push(`Life stage: ${age.lifeStage}`);
                facts.push(`Your zodiac sign: ${age.zodiacSign}`);
                facts.push(`You have lived ${age.totalDays.toLocaleString()} days so far`);
                facts.push(`Your heart has beaten approximately: ${(age.totalDays * 24 * 60 * 70).toLocaleString()} times`);
                facts.push(`You have breathed approximately: ${(age.totalDays * 24 * 60 * 16).toLocaleString()} times`);
            }
            
            return facts;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }
        
        function resetCalculator() {
            document.getElementById('birthDate').value = '';
            document.getElementById('currentDate').value = '';
            document.getElementById('resultSection').classList.remove('show');
            hideError();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set default current date
            document.getElementById('currentDate').value = new Date().toISOString().split('T')[0];
        });
    </script>
