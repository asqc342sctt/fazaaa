<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Picker - Free Online Tool | منتقي الألوان مجاناً</title>
    <meta name="description" content="Pick colors and convert between HEX, RGB, HSL formats. Free online color picker tool with contrast checker and recent colors. | اختيار الألوان وتحويلها مجاناً.">
    <meta name="keywords" content="color picker, color chooser, HEX to RGB, RGB to HEX, color converter, free online tool, منتقي الألوان, HEX, RGB, Color Picker">
    <meta name="author" content="FazzaPlay">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <link rel="canonical" href="https://fazzaplay.com/tools/color-picker">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="tools.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8571192174854530"
     crossorigin="anonymous"></script>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo"><span>FazzaPlay</span></div>
                <div class="nav-menu">
                    <a href="../index.html#tools" class="nav-link">الأدوات</a>
                    <a href="../index.html#about" class="nav-link">حول</a>
                </div>
                <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
            </div>
        </nav>
    </header>
    <!-- إعلان قبل الفوتر -->
    <div class="fazza-ad-unit">
        <script type="text/javascript">atOptions = { 'key' : 'abae43c3093c7f7459553dac34caad9a', 'format' : 'iframe', 'height' : 90, 'width' : 320, 'params' : {} };</script>
        <script type="text/javascript" src="https://charmingpoliteinjunction.com/abae43c3093c7f7459553dac34caad9a/invoke.js"></script>
    </div>

    <main class="tool-page tool-color-picker">
        <section class="tool-hero">
            <div class="container">
                <h1>منتقي الألوان</h1>
                <p>اختر اللون واحصل على قيم HEX وRGB فوراً.</p>
            </div>
        </section>

        <section class="tool-content container">
            <h2><i class="fas fa-palette"></i> منتقي الألوان</h2>
            <div class="tool-interface">
                <div class="color-grid">
                    <div class="color-picker-block">
                        <label for="colorPicker">اختر لون:</label>
                        <input type="color" id="colorPicker" value="#667eea">
                        <div class="preview-box" id="colorPreview"></div>
                    </div>
                    <div class="color-fields">
                        <div class="field-row">
                            <label for="hexInput">HEX</label>
                            <div class="field-actions">
                                <input type="text" id="hexInput" value="#667eea" placeholder="#RRGGBB">
                                <button type="button" id="copyHex" class="copy-btn"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="rgbInput">RGB</label>
                            <div class="field-actions">
                                <input type="text" id="rgbInput" value="rgb(102, 126, 234)" placeholder="rgb(r, g, b)">
                                <button type="button" id="copyRgb" class="copy-btn"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="actions-row">
                            <button type="button" id="eyedropperBtn"><i class="fas fa-eye-dropper"></i> قطّارة اللون</button>
                        </div>
                    </div>
                </div>
                <div class="result-area color-contrast" id="contrastBox">
                    <h3>التباين وملاءمة النص</h3>
                    <div class="contrast-rows">
                        <div class="contrast-item">
                            <div class="contrast-sample" id="sampleOnWhite">نص على خلفية بيضاء</div>
                            <p>نسبة التباين: <span id="contrastWhite">-</span> <small id="wcagWhite"></small></p>
                        </div>
                        <div class="contrast-item">
                            <div class="contrast-sample dark" id="sampleOnBlack">نص على خلفية سوداء</div>
                            <p>نسبة التباين: <span id="contrastBlack">-</span> <small id="wcagBlack"></small></p>
                        </div>
                    </div>
                </div>
                <div class="result-area">
                    <h3>ألوان حديثة</h3>
                    <div class="swatches" id="recentSwatches"></div>
                </div>
            </div>
        </section>
    </main>
    <!-- إعلان قبل الفوتر -->
    <div class="fazza-ad-unit">
        <script type="text/javascript">atOptions = { 'key' : 'abae43c3093c7f7459553dac34caad9a', 'format' : 'iframe', 'height' : 90, 'width' : 320, 'params' : {} };</script>
        <script type="text/javascript" src="https://charmingpoliteinjunction.com/abae43c3093c7f7459553dac34caad9a/invoke.js"></script>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 FazzaPlay</p>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initializeToolEvents === 'function') {
                initializeToolEvents('color-picker');
            }
        });
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.querySelector('.nav-menu');
        if (navToggle && navMenu) {
            navToggle.addEventListener('click', () => {
                const isVisible = navMenu.style.display === 'flex';
                navMenu.style.display = isVisible ? 'none' : 'flex';
            });
        }
    });
    </script>
</body>
</html>
