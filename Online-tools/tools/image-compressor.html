    <script>
        // واجهة مبسطة من خطوتين: 1) عرض أن الصورة تم رفعها 2) ضغط ثم إظهار زر التحميل
        (function() {
            const fileInput = document.getElementById('imageFile');
            const compressBtn = document.getElementById('compressBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const previewBox = document.getElementById('simplePreviewBox');
            const previewImg = document.getElementById('simplePreview');
            const nameSpan = document.getElementById('simpleName');
            const sizeSpan = document.getElementById('simpleSize');
            let compressedBlob = null;
            let downloadName = 'FazzaPlay.jpg';

            function formatSize(bytes){
                if (bytes === 0) return '0 Bytes';
                const k = 1024; const sizes = ['Bytes','KB','MB','GB'];
                const i = Math.floor(Math.log(bytes)/Math.log(k));
                return (bytes/Math.pow(k,i)).toFixed(2) + ' ' + sizes[i];
            }

            function compress(file){
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = function(){
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(b => b ? resolve(b) : reject(new Error('blob failed')), 'image/jpeg', 0.7);
                    };
                    img.onerror = () => reject(new Error('invalid image'));
                    img.src = URL.createObjectURL(file);
                });
            }

            fileInput.addEventListener('change', function(){
                const file = this.files && this.files[0];
                compressedBlob = null;
                downloadBtn.style.display = 'none';
                if (!file) { previewBox.style.display = 'none'; compressBtn.disabled = true; return; }
                // Show preview and info
                const reader = new FileReader();
                reader.onload = function(e){
                    previewImg.src = e.target.result;
                    nameSpan.textContent = file.name;
                    sizeSpan.textContent = formatSize(file.size);
                    previewBox.style.display = 'block';
                };
                reader.readAsDataURL(file);
                compressBtn.disabled = false;
                try { if (typeof showNotification === 'function') showNotification('تم رفع الصورة ✓', 'success'); } catch(e) {}
            });

            compressBtn.addEventListener('click', async function(){
                const file = fileInput.files && fileInput.files[0];
                if (!file) return;
                compressBtn.disabled = true;
                compressBtn.textContent = 'جارٍ الضغط...';
                try { if (typeof showNotification === 'function') showNotification('جاري ضغط الصورة...', 'info'); } catch(e) {}
                try{
                    compressedBlob = await compress(file);
                    // تسمية الملف باسم الموقع
                    downloadName = 'FazzaPlay-compressed.jpg';
                    downloadBtn.style.display = 'inline-block';
                    try { if (typeof showNotification === 'function') showNotification('تم ضغط الصورة، يمكنك التحميل الآن', 'success'); } catch(e) {}
                } catch(err){
                    compressedBlob = null;
                    try { if (typeof showNotification === 'function') showNotification('فشل ضغط الصورة', 'error'); } catch(e) {}
                } finally {
                    compressBtn.disabled = false;
                    compressBtn.textContent = 'ضغط الصورة';
                }
            });

            downloadBtn.addEventListener('click', function(){
                if (!compressedBlob) return;
                const a = document.createElement('a');
                a.href = URL.createObjectURL(compressedBlob);
                a.download = downloadName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            });
        })();
    </script>
