    <!-- إعلان قبل الفوتر -->

        <script type="text/javascript">atOptions = { 'key' : 'abae43c3093c7f7459553dac34caad9a', 'format' : 'iframe', 'height' : 90, 'width' : 320, 'params' : {} };</script>

        <section class="tool-content container">
            <h2><i class="fas fa-dice"></i> مولد الأرقام العشوائية</h2>
            <div class="tool-interface">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; align-items:end">
                    <div>
                        <label>الحد الأدنى:</label>
                        <input type="number" id="minNumber" value="1">
                    </div>
                    <div>
                        <label>الحد الأقصى:</label>
                        <input type="number" id="maxNumber" value="100">
                    </div>
                    <div>
                        <label>عدد الأرقام:</label>
                        <input type="number" id="numberCount" value="1" min="1" max="1000">
                    </div>
                    <div>
                        <label>الفاصل:</label>
                        <select id="delimiter">
                            <option value=", ">فاصلة ,</option>
                            <option value=" \n">سطر جديد</option>
                            <option value=" ">مسافة</option>
                            <option value="; ">فاصلة منقوطة ;</option>
                        </select>
                    </div>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px">
                    <label style="display:flex; align-items:center; gap:6px"><input type="checkbox" id="uniqueNumbers"> أرقام غير مكررة</label>
                    <label style="display:flex; align-items:center; gap:6px"><input type="checkbox" id="sortNumbers" checked> ترتيب تصاعدي</label>
                </div>

                <div class="action-buttons" style="margin-top:14px">
                    <button id="generateBtn" onclick="generateRandomNumbersAdvanced()" class="generate-btn"><i class="fas fa-bolt"></i> توليد</button>
                    <button id="copyBtn" class="secondary-btn" style="margin-inline-start:8px" onclick="copyNumbers()"><i class="fas fa-copy"></i> نسخ</button>
                    <button id="resetBtn" class="reset-btn" style="margin-inline-start:8px" onclick="resetRandomForm()"><i class="fas fa-redo"></i> إعادة تعيين</button>
                </div>

                <div class="result-area" id="numberResult" style="display:none; margin-top:14px">
                    <div class="card" style="padding:12px">
                        <div style="font-size:13px; color:#666; margin-bottom:6px" id="summary"></div>
                        <textarea id="numbersText" style="width:100%; min-height:110px; resize:vertical; direction:ltr" readonly></textarea>
                    </div>
                </div>
            </div>
        </section>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initializeToolEvents === 'function') {
                initializeToolEvents('random-number');
            }
        });

        function showMsg(msg, type){
            try { if (typeof showNotification === 'function') showNotification(msg, type || 'info'); } catch(e) { alert(msg); }
        }

        function getRandomIntSecure(min, max){
            min = Math.ceil(min); max = Math.floor(max);
            if (window.crypto && window.crypto.getRandomValues) {
                const range = max - min + 1;
                if (range <= 0) return min;
                const maxUint32 = 0xFFFFFFFF;
                const limit = Math.floor(maxUint32 / range) * range;
                let x = new Uint32Array(1);
                do { window.crypto.getRandomValues(x); } while (x[0] >= limit);
                return min + (x[0] % range);
            } else {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }
        }

        function generateRandomNumbersAdvanced(){
            const min = parseInt(document.getElementById('minNumber').value);
            const max = parseInt(document.getElementById('maxNumber').value);
            const count = parseInt(document.getElementById('numberCount').value);
            const unique = document.getElementById('uniqueNumbers').checked;
            const sortAsc = document.getElementById('sortNumbers').checked;
            const delimiter = document.getElementById('delimiter').value;

            if (Number.isNaN(min) || Number.isNaN(max)) { showMsg('رجاءً أدخل الحدود بشكل صحيح', 'warning'); return; }
            if (min > max) { showMsg('الحد الأدنى يجب أن يكون أقل من الحد الأقصى', 'warning'); return; }
            if (!Number.isInteger(count) || count < 1) { showMsg('عدد الأرقام يجب أن يكون 1 على الأقل', 'warning'); return; }
            const rangeSize = max - min + 1;
            if (unique && count > rangeSize) { showMsg('عدد الأرقام غير المكررة أكبر من حجم النطاق', 'warning'); return; }

            let numbers = [];
            if (unique) {
                const used = new Set();
                while (numbers.length < count) {
                    const n = getRandomIntSecure(min, max);
                    if (!used.has(n)) { used.add(n); numbers.push(n); }
                }
            } else {
                for (let i = 0; i < count; i++) numbers.push(getRandomIntSecure(min, max));
            }

            if (sortAsc) numbers.sort((a,b) => a - b);

            const resultDiv = document.getElementById('numberResult');
            const textArea = document.getElementById('numbersText');
            const summary = document.getElementById('summary');
            textArea.value = numbers.join(delimiter);
            const minVal = Math.min(...numbers), maxVal = Math.max(...numbers);
            summary.textContent = `تم توليد ${numbers.length} رقمًا ضمن (${min} إلى ${max}) — أصغر: ${minVal}، أكبر: ${maxVal}${unique ? '، بدون تكرار' : ''}${sortAsc ? '، مرتبة' : ''}.`;
            resultDiv.style.display = 'block';
            resultDiv.style.animation = 'slideInUp 0.5s ease-out';
            showMsg('تم توليد الأرقام بنجاح', 'success');
        }

        function copyNumbers(){
            const textArea = document.getElementById('numbersText');
            if (!textArea.value) { showMsg('لا توجد أرقام لنسخها', 'warning'); return; }
            navigator.clipboard.writeText(textArea.value).then(() => showMsg('تم نسخ الأرقام إلى الحافظة', 'success'));
        }

        function resetRandomForm(){
            document.getElementById('minNumber').value = 1;
            document.getElementById('maxNumber').value = 100;
            document.getElementById('numberCount').value = 1;
            document.getElementById('uniqueNumbers').checked = false;
            document.getElementById('sortNumbers').checked = true;
            document.getElementById('delimiter').value = ', ';
            const resultDiv = document.getElementById('numberResult');
            const textArea = document.getElementById('numbersText');
            const summary = document.getElementById('summary');
            textArea.value = '';
            summary.textContent = '';
            resultDiv.style.display = 'none';
        }
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.querySelector('.nav-menu');
        if (navToggle && navMenu) {
            navToggle.addEventListener('click', () => {
                const isVisible = navMenu.style.display === 'flex';
                navMenu.style.display = isVisible ? 'none' : 'flex';
            });
        }
    });
    </script>
