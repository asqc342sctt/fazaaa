        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo"><span>FazzaPlay</span></div>

                    <a href="../index.html#tools" class="nav-link">الأدوات</a>
                    <a href="../index.html#about" class="nav-link">حول</a>
                </div>

            </div>

    <!-- إعلان قبل الفوتر -->
    <div class="fazza-ad-unit">

    <main class="tool-page tool-text-counter">
        <section class="tool-hero">
            <div class="container">
                <h1>عداد النصوص | Text Counter</h1>
                <p>احسب الكلمات والحروف والأسطر مباشرة أثناء الكتابة · Count characters, words and lines live.</p>
            </div>
        </section>

        <section class="tool-content container">
            <h2><i class="fas fa-calculator"></i> عداد النصوص | Text Counter</h2>
            <div class="tool-interface">
                <div>
                    <label>أدخل النص | Enter text:</label>
                    <textarea id="textInput" rows="10" placeholder="اكتب أو الصق النص هنا | Type or paste your text here..."></textarea>
                </div>
                <div class="result-area" id="textCountResult" style="margin-top:12px;">
                    <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
                        <div class="card" style="padding:12px;text-align:center;">
                            <div style="font-size:0.95rem;opacity:0.8;">الأحرف | Characters</div>
                            <div id="charCount" style="font-size:1.6rem;font-weight:700;">0</div>
                        </div>
                        <div class="card" style="padding:12px;text-align:center;">
                            <div style="font-size:0.95rem;opacity:0.8;">الكلمات | Words</div>
                            <div id="wordCount" style="font-size:1.6rem;font-weight:700;">0</div>
                        </div>
                        <div class="card" style="padding:12px;text-align:center;">
                            <div style="font-size:0.95rem;opacity:0.8;">الأسطر | Lines</div>
                            <div id="lineCount" style="font-size:1.6rem;font-weight:700;">0</div>
                        </div>
                    </div>
                    <div class="result-actions" style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
                        <button id="copyTextCounterBtn" class="copy-btn"><i class="fas fa-copy"></i> نسخ | Copy</button>
                        <button id="downloadTextCounterBtn" class="download-btn"><i class="fas fa-download"></i> تنزيل TXT | Download TXT</button>
                        <button id="resetTextCounterBtn" class="reset-btn"><i class="fas fa-redo"></i> إعادة تعيين | Reset</button>
                    </div>
                </div>
            </div>
        </section>
