<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل اللعبة — Fazza Play</title>
  <meta name="description" content="تفاصيل اللعبة على Fazza Play">
  <link rel="icon" type="image/png" href="images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #030812;
      --bg2: #080f1c;
      --bg3: #0c1526;
      --card: #0d1929;
      --accent: #00c8ff;
      --accent2: #7c3aed;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --txt: #eaf2ff;
      --txt2: #8ba0bc;
      --txt3: #3d5270;
      --border: #162236;
      --border2: rgba(0,200,255,0.2);
      --glow: rgba(0,200,255,0.12);
      --r: 14px;
      --rl: 22px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      direction: rtl;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -5%, rgba(0,200,255,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(124,58,237,0.06) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* ═══ HEADER ═══ */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(3,8,18,0.9);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center;
      justify-content: space-between; height: 64px; gap: 1rem;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      box-shadow: 0 0 18px rgba(0,200,255,0.3);
    }
    .logo-primary {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem; font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--txt2); text-decoration: none;
      padding: 8px 16px; border-radius: 50px;
      font-size: 0.88rem; font-weight: 600;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--border2); color: var(--accent); background: var(--glow); }

    /* ═══ HERO BANNER ═══ */
    .game-hero {
      position: relative; z-index: 1;
      height: 520px; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: transform 8s ease;
    }
    .game-hero:hover .hero-bg { transform: scale(1.04); }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(3,8,18,0.2) 0%,
        rgba(3,8,18,0.5) 40%,
        rgba(3,8,18,0.92) 80%,
        var(--bg) 100%);
    }
    .hero-content {
      position: absolute; bottom: 0; right: 0; left: 0;
      padding: 2rem 0 2.5rem;
    }
    .hero-content .container { display: flex; align-items: flex-end; gap: 2rem; }
    .hero-cover {
      width: 160px; height: 200px; flex-shrink: 0;
      border-radius: var(--r); overflow: hidden;
      border: 2px solid rgba(0,200,255,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,200,255,0.15);
      background: var(--bg3);
    }
    .hero-cover img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { flex: 1; padding-bottom: 0.5rem; }
    .hero-genres {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.8rem;
    }
    .gtag {
      font-size: 0.7rem; color: var(--accent);
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 4px; padding: 3px 10px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hero-title {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900; line-height: 1.15;
      margin-bottom: 0.8rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .hero-badges {
      display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;
    }
    .hbadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 50px;
      font-size: 0.82rem; font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .hb-rating { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4); color: var(--gold); }
    .hb-meta { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: var(--green); }
    .hb-meta.yellow { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); color: var(--gold); }
    .hb-meta.red { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--red); }
    .hb-date { background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; }
    .hb-time { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.25); color: var(--accent); }

    /* Stars */
    .stars { display: flex; gap: 2px; }
    .star { color: var(--gold); font-size: 14px; }
    .star.e { color: var(--txt3); }

    /* ═══ MAIN CONTENT ═══ */
    .main-content {
      position: relative; z-index: 1;
      padding: 3rem 0 5rem;
    }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2.5rem;
      align-items: start;
    }

    /* ═══ SECTIONS ═══ */
    .section-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }
    .section-block h2 {
      font-size: 1rem; font-weight: 800;
      color: var(--accent); margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 8px;
      text-transform: uppercase; letter-spacing: 1px;
      font-family: 'Orbitron', monospace; font-size: 0.82rem;
    }
    .section-block h2::before {
      content: '';
      width: 3px; height: 16px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 2px; display: block;
    }

    .desc-text {
      color: var(--txt2); line-height: 1.9;
      font-size: 0.95rem;
    }
    .desc-text.collapsed { max-height: 150px; overflow: hidden; position: relative; }
    .desc-text.collapsed::after {
      content: '';
      position: absolute; bottom: 0; right: 0; left: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--card));
    }
    .read-more {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--accent);
      font-family: 'Cairo', sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; margin-top: 0.8rem; padding: 0;
      transition: opacity 0.2s;
    }
    .read-more:hover { opacity: 0.75; }

    /* Info grid */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .info-row {
      background: var(--bg3); border-radius: 10px;
      padding: 0.9rem 1rem;
    }
    .info-key {
      font-size: 0.7rem; color: var(--txt3);
      font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 5px;
    }
    .info-val { font-size: 0.9rem; font-weight: 600; color: var(--txt); }
    .info-val a { color: var(--accent); text-decoration: none; }
    .info-val a:hover { text-decoration: underline; }

    /* Tags */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tag {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px;
      font-size: 0.8rem; color: var(--txt2);
      transition: all 0.2s; cursor: default;
    }
    .tag:hover { border-color: var(--border2); color: var(--accent); }

    /* Platform icons */
    .plat-grid { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .plat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-size: 0.82rem; color: var(--txt2);
    }

    /* Screenshots */
    .screens-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }
    .screen-img {
      border-radius: 10px; overflow: hidden;
      aspect-ratio: 16/9; cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .screen-img:hover { border-color: var(--border2); transform: scale(1.02); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .screen-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    .action-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rl); padding: 1.5rem;
      text-align: center;
    }
    .action-card .game-score {
      font-family: 'Orbitron', monospace;
      font-size: 3rem; font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: block; line-height: 1; margin-bottom: 0.3rem;
    }
    .action-card .score-lbl { font-size: 0.8rem; color: var(--txt3); margin-bottom: 1.2rem; }
    .action-card .stars { justify-content: center; margin-bottom: 1.5rem; font-size: 18px; }
    .action-card .stars .star { font-size: 20px; }

    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; text-decoration: none;
      padding: 13px; border-radius: 12px;
      font-weight: 800; font-size: 1rem; font-family: 'Cairo', sans-serif;
      border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,200,255,0.3);
      transition: all 0.3s; margin-bottom: 0.8rem;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,200,255,0.4); }

    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: none; border: 1.5px solid var(--border2); color: var(--txt);
      padding: 12px; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem; font-family: 'Cairo', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--glow); }
    .btn-secondary.wished { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }

    /* Stats sidebar */
    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row .sk { font-size: 0.82rem; color: var(--txt2); }
    .stat-row .sv { font-size: 0.9rem; font-weight: 700; color: var(--txt); }

    /* Related games */
    .related-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .related-card {
      display: flex; gap: 0.9rem; align-items: center;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.7rem;
      text-decoration: none; transition: all 0.2s;
      cursor: pointer;
    }
    .related-card:hover { border-color: var(--border2); background: var(--card); transform: translateX(-3px); }
    .related-thumb {
      width: 70px; height: 48px; flex-shrink: 0;
      border-radius: 7px; overflow: hidden; background: var(--bg2);
    }
    .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .related-info h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 3px; }
    .related-info span { font-size: 0.75rem; color: var(--txt2); }

    /* Loader */
    .page-loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 1.5rem;
    }
    .loader {
      width: 56px; height: 56px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt { color: var(--txt3); font-size: 0.95rem; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Error */
    .error-box {
      text-align: center; padding: 5rem 2rem;
    }
    .error-box .err-icon { font-size: 4rem; margin-bottom: 1rem; }
    .error-box h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .error-box p { color: var(--txt2); margin-bottom: 1.5rem; }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(3,8,18,0.95); backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 12px; box-shadow: 0 30px 80px rgba(0,0,0,0.8); }
    .lightbox-close {
      position: absolute; top: 1rem; left: 1rem;
      background: rgba(13,25,41,0.85); border: 1px solid var(--border);
      width: 40px; height: 40px; border-radius: 50%;
      color: var(--txt2); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lightbox-close:hover { background: rgba(239,68,68,0.2); border-color: var(--red); color: var(--red); }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 50%; transform: translateX(50%);
      background: var(--card); border: 1px solid var(--border2);
      color: var(--txt); padding: 12px 24px; border-radius: 50px;
      font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999;
    }
    .toast.show { opacity: 1; }

    /* Responsive */
    @media (max-width: 900px) {
      .content-grid { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
      .action-card { display: flex; flex-direction: column; align-items: center; }
      .game-hero { height: 380px; }
      .hero-cover { width: 110px; height: 140px; }
      .screens-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .game-hero { height: 300px; }
      .hero-cover { display: none; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  // ═══ GET GAME ID FROM URL ═══
  const params = new URLSearchParams(window.location.search);
  let gameId = params.get('id');
  const slug = params.get('slug');
  
  // If slug is provided, convert to ID
  if (slug && SLUG_TO_ID[slug]) {
    gameId = SLUG_TO_ID[slug];
  }

  // ═══ INIT ═══
  if (!gameId) {
    showError('لم يتم تحديد اللعبة', 'يرجى اختيار لعبة من المكتبة');
  } else {
    loadGame(gameId);
  }

  // ═══ LOAD GAME ═══
  async function loadGame(id) {
    // Try local fallback first to check if we have it
    const fallback = FALLBACK_GAMES.find(g => String(g.id) === String(id));

    if (false) {
      if (fallback) renderGame(fallback, null);
      else showError('اللعبة غير موجودة', 'لم نجد هذه اللعبة في المكتبة المحلية');
      return;
    }

    try {
      const [gameRes, screensRes] = await Promise.all([
        fetch(`https://api.rawg.io/api/games/${id}?key=${RAWG_KEY}`),
        fetch(`https://api.rawg.io/api/games/${id}/screenshots?key=${RAWG_KEY}&page_size=6`)
      ]);
      if (!gameRes.ok) throw new Error('not found');
      const game = await gameRes.json();
      const screens = screensRes.ok ? await screensRes.json() : { results: [] };
      renderGame(game, screens.results || []);
    } catch (err) {
      if (fallback) {
        renderGame(fallback, null);
      } else {
        showError('تعذّر تحميل اللعبة', 'تحقق من اتصالك بالإنترنت وأعد المحاولة');
      }
    }
  }

  // ═══ RENDER ═══
  function renderGame(g, screenshots) {
    // Generate SEO-friendly slug
    const gameSlug = ID_TO_SLUG[g.id] || g.slug || createSlug(g.name);
    const canonicalUrl = `https://fazzaplay.com/game/${gameSlug}`;
    
    // Update page title and meta tags for SEO
    document.title = `${g.name} — تحميل وتفاصيل اللعبة | Fazza Play`;
    
    // Update or create meta description
    const metaDesc = document.querySelector('meta[name="description"]');
    const shortDesc = stripHtml(g.description || '').substring(0, 155);
    const descContent = `${g.name} - ${shortDesc}... تقييم ${g.rating || 'N/A'}/5 ⭐ تحميل ومعلومات كاملة عن اللعبة على Fazza Play`;
    if (metaDesc) {
      metaDesc.setAttribute('content', descContent);
    } else {
      const newMeta = document.createElement('meta');
      newMeta.name = 'description';
      newMeta.content = descContent;
      document.head.appendChild(newMeta);
    }
    
    // Add canonical URL
    let canonical = document.querySelector('link[rel="canonical"]');
    if (!canonical) {
      canonical = document.createElement('link');
      canonical.rel = 'canonical';
      document.head.appendChild(canonical);
    }
    canonical.href = canonicalUrl;
    
    // Add Open Graph tags for social sharing
    updateMetaTag('og:title', `${g.name} — Fazza Play`);
    updateMetaTag('og:description', descContent);
    updateMetaTag('og:image', g.background_image || '');
    updateMetaTag('og:url', canonicalUrl);
    updateMetaTag('og:type', 'website');
    
    // Add Twitter Card tags
    updateMetaTag('twitter:card', 'summary_large_image', 'name');
    updateMetaTag('twitter:title', `${g.name} — Fazza Play`, 'name');
    updateMetaTag('twitter:description', descContent, 'name');
    updateMetaTag('twitter:image', g.background_image || '', 'name');

    const released = g.released
      ? new Date(g.released).toLocaleDateString('ar-EG', {year:'numeric',month:'long',day:'numeric'})
      : '—';
    const rating = g.rating || 0;
    const stars = [1,2,3,4,5].map(s => `<span class="star${s <= Math.round(rating) ? '' : ' e'}">★</span>`).join('');
    const genres = (g.genres||[]).map(x => `<span class="gtag">${translateG(x.name)}</span>`).join('');
    const platforms = (g.platforms||[]).map(p => `<div class="plat-chip">${getPlatIcon(p.platform.name)} ${p.platform.name}</div>`).join('');
    const tags = (g.tags||[]).slice(0,20).map(t => `<span class="tag">${t.name}</span>`).join('');
    const devs = (g.developers||[]).map(d=>d.name).join('، ') || '—';
    const pubs = (g.publishers||[]).map(p=>p.name).join('، ') || '—';
    const desc = stripHtml(g.description || 'لا يوجد وصف متاح لهذه اللعبة حالياً.');
    const mc = g.metacritic;
    const mcColor = mc >= 75 ? '' : mc >= 50 ? ' yellow' : ' red';
    const descId = 'gameDesc';

    // Wishlist
    let wishlist = [];
    try { wishlist = JSON.parse(localStorage.getItem('fp_wishlist') || '[]'); } catch(e) {}
    const inWish = wishlist.includes(g.id);

    // Screenshots HTML
    let screensHtml = '';
    if (screenshots && screenshots.length > 0) {
      screensHtml = `
        <div class="section-block">
          <h2>لقطات الشاشة</h2>
          <div class="screens-grid">
            ${screenshots.slice(0,4).map(s => `
              <div class="screen-img" onclick="openLightbox('${s.image}')">
                <img src="${s.image}" alt="Screenshot" loading="lazy">
              </div>`).join('')}
          </div>
        </div>`;
    }

    // Related games from fallback
    const related = FALLBACK_GAMES
      .filter(x => x.id !== g.id && (x.genres||[]).some(gn => (g.genres||[]).some(gg => gg.name === gn.name)))
      .slice(0,5);

    const relatedHtml = related.length ? `
      <div class="section-block">
        <h2>ألعاب مشابهة</h2>
        <div class="related-list">
          ${related.map(r => `
            <div class="related-card" onclick="location.href='game.html?id=${r.id}'">
              <div class="related-thumb"><img src="${r.background_image}" alt="${esc(r.name)}" loading="lazy"></div>
              <div class="related-info">
                <h4>${esc(r.name)}</h4>
                <span>⭐ ${r.rating.toFixed(1)} &nbsp;•&nbsp; ${r.released ? r.released.slice(0,4) : '—'}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>` : '';

    document.getElementById('main').innerHTML = `
      <!-- HERO -->
      <div class="game-hero">
        <div class="hero-bg" id="heroBg" style="background-image:url('${g.background_image || ''}')"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="container">
            <div class="hero-cover">
              <img src="${g.background_image || ''}" alt="${esc(g.name)}" onerror="this.style.opacity=0">
            </div>
            <div class="hero-info">
              <div class="hero-genres">${genres}</div>
              <h1 class="hero-title">${esc(g.name)}</h1>
              <div class="hero-badges">
                ${rating ? `<span class="hbadge hb-rating"><div class="stars">${stars}</div> ${rating.toFixed(1)}</span>` : ''}
                ${mc ? `<span class="hbadge hb-meta${mcColor}">Metacritic ${mc}</span>` : ''}
                ${g.released ? `<span class="hbadge hb-date">📅 ${released}</span>` : ''}
                ${g.playtime ? `<span class="hbadge hb-time">⏱️ ${g.playtime} ساعة</span>` : ''}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="main-content">
        <div class="container">
          <div class="content-grid">

            <!-- LEFT -->
            <div class="left-col">

              <!-- Description -->
              <div class="section-block">
                <h2>عن اللعبة</h2>
                <div class="desc-text collapsed" id="${descId}">${esc(desc)}</div>
                ${desc.length > 300 ? `<button class="read-more" id="readMoreBtn" onclick="toggleDesc()">اقرأ المزيد ↓</button>` : ''}
              </div>

              <!-- Info -->
              <div class="section-block">
                <h2>معلومات اللعبة</h2>
                <div class="info-grid">
                  <div class="info-row"><div class="info-key">المطوّر</div><div class="info-val">${esc(devs)}</div></div>
                  <div class="info-row"><div class="info-key">الناشر</div><div class="info-val">${esc(pubs)}</div></div>
                  <div class="info-row"><div class="info-key">تاريخ الإصدار</div><div class="info-val">${released}</div></div>
                  ${g.playtime ? `<div class="info-row"><div class="info-key">متوسط وقت اللعب</div><div class="info-val">${g.playtime} ساعة</div></div>` : ''}
                  ${g.esrb_rating ? `<div class="info-row"><div class="info-key">التصنيف العمري</div><div class="info-val">${g.esrb_rating.name}</div></div>` : ''}
                  ${g.website ? `<div class="info-row"><div class="info-key">الموقع الرسمي</div><div class="info-val"><a href="${g.website}" target="_blank" rel="noopener">زيارة الموقع ←</a></div></div>` : ''}
                </div>
              </div>

              <!-- Platforms -->
              ${platforms ? `
              <div class="section-block">
                <h2>المنصات المدعومة</h2>
                <div class="plat-grid">${platforms}</div>
              </div>` : ''}

              <!-- Screenshots -->
              ${screensHtml}

              <!-- Tags -->
              ${tags ? `
              <div class="section-block">
                <h2>الوسوم</h2>
                <div class="tags-wrap">${tags}</div>
              </div>` : ''}
            </div>

            <!-- SIDEBAR -->
            <div class="sidebar">

              <!-- Score card -->
              <div class="action-card">
                <span class="game-score">${rating ? rating.toFixed(1) : '—'}</span>
                <span class="score-lbl">تقييم اللاعبين من 5</span>
                <div class="stars">${stars}</div>
                ${g.ratings_count ? `<div style="font-size:0.8rem;color:var(--txt3);margin-bottom:1.2rem">${g.ratings_count.toLocaleString()} تقييم</div>` : ''}
                <button class="btn-secondary" id="wishBtn" onclick="toggleWish(${g.id})">
                  ${inWish ? '❤️ في المفضلة' : '🤍 أضف للمفضلة'}
                </button>
              </div>

              <!-- Stats -->
              <div class="section-block" style="margin-bottom:0">
                <h2>إحصائيات</h2>
                ${mc ? `<div class="stat-row"><span class="sk">Metacritic</span><span class="sv" style="color:${mc>=75?'var(--green)':mc>=50?'var(--gold)':'var(--red)'}">${mc}/100</span></div>` : ''}
                ${g.added ? `<div class="stat-row"><span class="sk">أُضيف للمكتبات</span><span class="sv">${g.added.toLocaleString()}</span></div>` : ''}
                ${g.playtime ? `<div class="stat-row"><span class="sk">متوسط اللعب</span><span class="sv">${g.playtime} ساعة</span></div>` : ''}
                ${g.released ? `<div class="stat-row"><span class="sk">سنة الإصدار</span><span class="sv">${g.released.slice(0,4)}</span></div>` : ''}
                ${g.genres && g.genres.length ? `<div class="stat-row"><span class="sk">التصنيف</span><span class="sv">${g.genres.slice(0,2).map(x=>translateG(x.name)).join(' / ')}</span></div>` : ''}
              </div>

              <!-- Related -->
              ${relatedHtml}
            </div>

          </div>
        </div>
      </div>
    `;
  }

  // ═══ HELPERS ═══
  function showError(title, msg) {
    document.getElementById('main').innerHTML = `
      <div class="error-box container">
        <div class="err-icon">🎮</div>
        <h2>${title}</h2>
        <p>${msg}</p>
        <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:700">
          ← العودة للمكتبة
        </a>
      </div>`;
  }

  function toggleDesc() {
    const el = document.getElementById('gameDesc');
    const btn = document.getElementById('readMoreBtn');
    if (el.classList.contains('collapsed')) {
      el.classList.remove('collapsed');
      btn.textContent = 'اقرأ أقل ↑';
    } else {
      el.classList.add('collapsed');
      btn.textContent = 'اقرأ المزيد ↓';
    }
  }

  function toggleWish(id) {
    let wishlist = [];
    try { wishlist = JSON.parse(localStorage.getItem('fp_wishlist') || '[]'); } catch(e) {}
    const btn = document.getElementById('wishBtn');
    const idx = wishlist.indexOf(id);
    if (idx === -1) {
      wishlist.push(id);
      btn.innerHTML = '❤️ في المفضلة';
      btn.classList.add('wished');
      showToast('✅ أُضيف للمفضلة');
    } else {
      wishlist.splice(idx, 1);
      btn.innerHTML = '🤍 أضف للمفضلة';
      btn.classList.remove('wished');
      showToast('❌ أُزيل من المفضلة');
    }
    try { localStorage.setItem('fp_wishlist', JSON.stringify(wishlist)); } catch(e) {}
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function stripHtml(h) {
    const d = document.createElement('div'); d.innerHTML = h;
    return d.textContent || d.innerText || '';
  }
  function translateG(n) {
    const m = {Action:'أكشن',RPG:'RPG',Shooter:'شوتر',Adventure:'مغامرات',Strategy:'استراتيجية',Sports:'رياضة',Racing:'سباق',Puzzle:'بازل',Platformer:'منصات',Fighting:'قتال',Simulation:'محاكاة',Casual:'كاجوال',Arcade:'أركيد',Indie:'إندي',Family:'عائلي'};
    return m[n] || n;
  }
  function getPlatIcon(name) {
    if (/playstation|ps/i.test(name)) return '🎮';
    if (/xbox/i.test(name)) return '🟢';
    if (/nintendo|switch/i.test(name)) return '🔴';
    if (/pc|windows/i.test(name)) return '🖥️';
    if (/ios|iphone/i.test(name)) return '📱';
    if (/android/i.test(name)) return '🤖';
    return '🎯';
  }
  
  // Helper function to create SEO-friendly slug
  function createSlug(name) {
    return name
      .toLowerCase()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/--+/g, '-')
      .trim();
  }
  
  // Helper function to update or create meta tags
  function updateMetaTag(property, content, attr = 'property') {
    let meta = document.querySelector(`meta[${attr}="${property}"]`);
    if (!meta) {
      meta = document.createElement('meta');
      meta.setAttribute(attr, property);
      document.head.appendChild(meta);
    }
    meta.setAttribute('content', content);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
