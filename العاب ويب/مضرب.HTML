<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المضرب الاحترافية - Fazza Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .game-header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 15px 30px;
            text-align: center;
            min-width: 120px;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(16, 185, 129, 0.15);
            transform: translateY(-3px);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #10b981;
            font-size: 2rem;
            font-weight: 800;
        }

        .game-canvas-wrapper {
            position: relative;
            background: #020617;
            border-radius: 16px;
            padding: 20px;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        #gameCanvas {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            border-radius: 12px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            display: block;
            margin: 0 auto;
        }

        .game-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #10b981;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }

        .game-info {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .game-info p {
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .game-info strong {
            color: #a78bfa;
        }

        .game-over-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1e293b, #334155);
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over-content h2 {
            font-size: 3rem;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-header h1 {
                font-size: 2rem;
            }

            #gameCanvas {
                height: 400px;
            }

            .stat-box {
                min-width: 100px;
                padding: 12px 20px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            #gameCanvas {
                height: 350px;
            }

            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🎮 لعبة المضرب</h1>
            <p>اكسر الطوب واحصل على أعلى نقاط!</p>
        </div>

        <div class="game-stats">
            <div class="stat-box">
                <div class="stat-label">النقاط</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">الحياة</div>
                <div class="stat-value" id="lives">3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">المستوى</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-difficulty="easy">سهل</button>
            <button class="difficulty-btn" data-difficulty="medium">متوسط</button>
            <button class="difficulty-btn" data-difficulty="hard">صعب</button>
        </div>

        <div class="game-canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" id="startBtn">ابدأ اللعب</button>
            <button class="btn btn-secondary" id="pauseBtn" disabled>إيقاف مؤقت</button>
            <button class="btn btn-secondary" id="resetBtn">إعادة تشغيل</button>
        </div>

        <div class="game-info">
            <p><strong>التحكم:</strong> استخدم الماوس أو اللمس لتحريك المضرب</p>
            <p><strong>الهدف:</strong> كسر جميع الطوب دون فقدان الكرة</p>
            <p><strong>المكافآت:</strong> الطوب الملون يعطي نقاط إضافية!</p>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>🎉 انتهت اللعبة</h2>
            <p id="finalScoreText">نقاطك النهائية: <strong>0</strong></p>
            <button class="btn btn-primary" id="playAgainBtn">العب مرة أخرى</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = Math.min(800, wrapper.clientWidth - 40);
            canvas.height = 500;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let difficulty = 'easy';

        // Paddle
        const paddle = {
            width: 120,
            height: 15,
            x: canvas.width / 2 - 60,
            y: canvas.height - 40,
            speed: 8,
            dx: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 4,
            dx: 4,
            dy: -4
        };

        // Bricks
        const brickInfo = {
            rows: 5,
            cols: 8,
            width: 0,
            height: 25,
            padding: 10,
            offsetX: 0,
            offsetY: 60,
            visible: true
        };

        let bricks = [];

        // Colors
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899'];

        function initBricks() {
            brickInfo.width = (canvas.width - (brickInfo.cols + 1) * brickInfo.padding) / brickInfo.cols;
            brickInfo.offsetX = brickInfo.padding;
            
            bricks = [];
            for (let row = 0; row < brickInfo.rows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brickInfo.cols; col++) {
                    bricks[row][col] = {
                        x: col * (brickInfo.width + brickInfo.padding) + brickInfo.offsetX,
                        y: row * (brickInfo.height + brickInfo.padding) + brickInfo.offsetY,
                        width: brickInfo.width,
                        height: brickInfo.height,
                        visible: true,
                        color: colors[row % colors.length],
                        points: (row + 1) * 10
                    };
                }
            }
        }

        function drawPaddle() {
            ctx.fillStyle = '#10b981';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#10b981';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
            
            // Gradient effect
            const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.height);
            gradient.addColorStop(0, '#34d399');
            gradient.addColorStop(1, '#059669');
            ctx.fillStyle = gradient;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#10b981';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.closePath();
        }

        function drawBricks() {
            bricks.forEach(row => {
                row.forEach(brick => {
                    if (brick.visible) {
                        ctx.fillStyle = brick.color;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = brick.color;
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        ctx.shadowBlur = 0;
                        
                        // Border
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                    }
                });
            });
        }

        function movePaddle() {
            paddle.x += paddle.dx;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }

            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Paddle collision
            if (
                ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width
            ) {
                ball.dy *= -1;
                
                // Add spin based on where ball hits paddle
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 8;
            }

            // Bottom wall
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                updateStats();
                
                if (lives === 0) {
                    gameOver();
                } else {
                    resetBall();
                }
            }

            // Brick collision
            bricks.forEach(row => {
                row.forEach(brick => {
                    if (brick.visible) {
                        if (
                            ball.x > brick.x &&
                            ball.x < brick.x + brick.width &&
                            ball.y > brick.y &&
                            ball.y < brick.y + brick.height
                        ) {
                            ball.dy *= -1;
                            brick.visible = false;
                            score += brick.points;
                            updateStats();
                            
                            // Check level complete
                            if (bricks.every(row => row.every(b => !b.visible))) {
                                levelUp();
                            }
                        }
                    }
                });
            });
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = -ball.speed;
        }

        function levelUp() {
            level++;
            ball.speed += 0.5;
            initBricks();
            resetBall();
            updateStats();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawPaddle();
            drawBall();
        }

        function update() {
            if (!gameRunning || gamePaused) return;
            
            movePaddle();
            moveBall();
            draw();
            
            requestAnimationFrame(update);
        }

        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                initBricks();
                update();
            }
        }

        function pauseGame() {
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? 'استئناف' : 'إيقاف مؤقت';
            if (!gamePaused) update();
        }

        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = difficulty === 'easy' ? 4 : difficulty === 'medium' ? 5 : 6;
            resetBall();
            initBricks();
            updateStats();
            draw();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = 'إيقاف مؤقت';
            document.getElementById('gameOverOverlay').classList.remove('active');
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScoreText').innerHTML = `نقاطك النهائية: <strong>${score}</strong>`;
            document.getElementById('gameOverOverlay').classList.add('active');
        }

        // Mouse/Touch controls
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            paddle.x = touchX - paddle.width / 2;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        });

        // Difficulty selection
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameRunning) return;
                
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
                
                ball.speed = difficulty === 'easy' ? 4 : difficulty === 'medium' ? 5 : 6;
                resetBall();
            });
        });

        // Button events
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('playAgainBtn').addEventListener('click', resetGame);

        // Initialize
        initBricks();
        draw();
    </script>
</body>
</html>
